      - key: govid_flow.yaml
        mountPath: /opt/thunder/repository/resources/flows
        value: |
          id: "b2c3d4e5-f6a7-8901-bcde-govid00flow1"
          name: "Gov.ID Authentication Flow"
          handle: "gov-id-authentication-flow"
          flowType: "AUTHENTICATION"
          nodes:
            - id: start
              type: START
              layout:
                size: { width: 101, height: 34 }
                position: { x: 62, y: 87 }
              onSuccess: view_govid
            - id: view_govid
              type: PROMPT
              layout:
                size: { width: 350, height: 1293 }
                position: { x: 310, y: -206 }
              meta:
                components:
                  - resourceType: ELEMENT
                    category: BLOCK
                    type: STACK
                    items: 1
                    direction: row
                    gap: 2
                    align: center
                    justify: center
                    components:
                      - resourceType: ELEMENT
                        category: DISPLAY
                        type: ICON
                        name: Fingerprint
                        size: "80"
                        color: currentColor
                        id: display_icon
                    id: block_icon
                  - resourceType: ELEMENT
                    category: DISPLAY
                    type: RICH_TEXT
                    label: '<h1 class="rich-text-heading-h1 rich-text-align-center"><b><strong class="rich-text-bold rich-text-pre-wrap">Gov·ID</strong></b></h1>'
                    id: display_brand
                  - resourceType: ELEMENT
                    category: DISPLAY
                    type: DIVIDER
                    id: display_div1
                    label: ""
                    variant: HORIZONTAL
                  - resourceType: ELEMENT
                    category: DISPLAY
                    type: RICH_TEXT
                    label: '<h3 class="rich-text-heading-h3 rich-text-align-left"><span class="rich-text-pre-wrap">Sign in</span></h3>'
                    id: display_signin
                  - resourceType: ELEMENT
                    category: DISPLAY
                    type: RICH_TEXT
                    label: '<p class="rich-text-paragraph" style="text-align: start;"><span class="rich-text-pre-wrap">Enter your credentials to access government services</span></p>'
                    id: display_desc
                  - resourceType: ELEMENT
                    category: BLOCK
                    type: BLOCK
                    id: block_form
                    components:
                      - resourceType: ELEMENT
                        category: FIELD
                        type: TEXT_INPUT
                        inputType: text
                        hint: ""
                        label: "NIC/Passport Number"
                        required: true
                        placeholder: "123456789V"
                        id: text_input_user
                        ref: username
                      - resourceType: ELEMENT
                        category: FIELD
                        type: PASSWORD_INPUT
                        ref: password
                        inputType: password
                        hint: ""
                        label: "Password"
                        required: true
                        placeholder: "Enter your password"
                        id: password_input_pw
                      - resourceType: ELEMENT
                        category: ACTION
                        type: ACTION
                        eventType: SUBMIT
                        id: action_submit
                        label: "Sign In"
                        variant: PRIMARY
                  - resourceType: ELEMENT
                    category: DISPLAY
                    type: RICH_TEXT
                    label: '<p class="rich-text-paragraph rich-text-align-center"><span class="rich-text-pre-wrap">Don''t have an account?&nbsp;</span><a href="#" class="rich-text-link"><span class="rich-text-pre-wrap">Register as a new user</span></a></p>'
                    id: display_register
                  - resourceType: ELEMENT
                    category: DISPLAY
                    type: RICH_TEXT
                    label: '<p class="rich-text-paragraph rich-text-align-center"><span class="rich-text-pre-wrap">Need help?&nbsp;</span><a href="#" class="rich-text-link"><span class="rich-text-pre-wrap">Contact support</span></a></p>'
                    id: display_support
              prompts:
                - action:
                    ref: action_submit
                    nextNode: basic_auth
                  inputs:
                    - ref: text_input_user
                      type: TEXT_INPUT
                      identifier: username
                      required: true
                    - ref: password_input_pw
                      type: PASSWORD_INPUT
                      identifier: password
                      required: true
            - id: basic_auth
              type: TASK_EXECUTION
              layout:
                size: { width: 217, height: 113 }
                position: { x: 820, y: 108 }
              executor:
                name: BasicAuthExecutor
                inputs:
                  - ref: text_input_user
                    type: TEXT_INPUT
                    identifier: username
                    required: true
                  - ref: password_input_pw
                    type: PASSWORD_INPUT
                    identifier: password
                    required: true
              onSuccess: auth_assert
            - id: auth_assert
              type: TASK_EXECUTION
              layout:
                size: { width: 244, height: 113 }
                position: { x: 1234, y: 108 }
              executor:
                name: AuthAssertExecutor
              onSuccess: END
            - id: END
              type: END
              layout:
                size: { width: 85, height: 34 }
                position: { x: 1650, y: 147 }
      - key: govid_layout.yaml
        mountPath: /opt/thunder/repository/resources/layouts
        value: |
          id: "c3d4e5f6-a7b8-9012-cdef-govid0layot1"
          handle: "gov-id-layout"
          displayName: "Gov.ID Layout"
          description: "Gov.ID layout with custom CSS for diagonal stripes, frosted glass card, and Sri Lankan flag-inspired styling."
