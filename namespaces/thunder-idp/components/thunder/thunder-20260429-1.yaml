apiVersion: openchoreo.dev/v1alpha1
kind: ComponentRelease
metadata:
  name: thunder-20260429-1
  namespace: thunder-idp
spec:
  componentProfile:
    parameters:
      image: ghcr.io/asgardeo/thunder:latest
      runtime:
        console:
          clientBase: /console
          clientId: CONSOLE
          scopes: '["openid", "profile", "email", "system"]'
        dbStorageSize: 1Gi
        dbType: sqlite
        gate:
          clientBase: /gate
        imagePullPolicy: Always
  componentType:
    kind: ClusterComponentType
    name: deployment/thunder
    spec:
      environmentConfigs:
        openAPIV3Schema:
          properties:
            endpointVisibility:
              default: external
              enum:
              - external
              - internal
              type: string
            gateClientHostname:
              default: ""
              type: string
            replicas:
              default: 1
              type: integer
            resourceLimitsCpu:
              default: 500m
              type: string
            resourceLimitsMemory:
              default: 512Mi
              type: string
            resourceRequestsCpu:
              default: 100m
              type: string
            resourceRequestsMemory:
              default: 128Mi
              type: string
            serverPublicUrl:
              default: ""
              type: string
          type: object
      parameters:
        openAPIV3Schema:
          properties:
            image:
              default: ghcr.io/asgardeo/thunder:latest
              type: string
            runtime:
              properties:
                console:
                  properties:
                    clientBase:
                      default: /console
                      type: string
                    clientId:
                      default: CONSOLE
                      type: string
                    scopes:
                      default: '["openid", "profile", "email"]'
                      type: string
                  type: object
                dbStorageSize:
                  default: 1Gi
                  type: string
                dbType:
                  default: sqlite
                  enum:
                  - sqlite
                  - postgres
                  type: string
                gate:
                  properties:
                    clientBase:
                      default: /gate
                      type: string
                  type: object
                imagePullPolicy:
                  default: Always
                  enum:
                  - Always
                  - IfNotPresent
                  - Never
                  type: string
              type: object
          type: object
      resources:
      - id: sqlite-pvc
        template:
          apiVersion: v1
          kind: PersistentVolumeClaim
          metadata:
            name: ${metadata.componentName}-sqlite
            namespace: ${metadata.namespace}
          spec:
            accessModes:
            - ReadWriteOnce
            resources:
              requests:
                storage: ${parameters.runtime.dbStorageSize}
      - id: setup-job
        template:
          apiVersion: batch/v1
          kind: Job
          metadata:
            name: ${metadata.componentName}-setup
            namespace: ${metadata.namespace}
          spec:
            backoffLimit: 3
            template:
              spec:
                containers:
                - command:
                  - sh
                  - -c
                  - ./setup.sh && touch /opt/thunder/repository/database/.setup-complete
                  env: |
                    ${configurations.configs.envs.map(e, {"name": e.name, "value": e.value}) + [
                      {"name": "WITH_CONSENT", "value": "false"}
                    ]}
                  image: ${parameters.image}
                  imagePullPolicy: ${parameters.runtime.imagePullPolicy}
                  name: setup
                  volumeMounts:
                  - mountPath: /opt/thunder/repository/conf/deployment.yaml
                    name: thunder-config
                    subPath: deployment.yaml
                  - mountPath: /opt/thunder/repository/database
                    name: sqlite-data
                initContainers:
                - args:
                  - |
                    if [ ! -f /data/.initialized ]; then
                      echo "Copying database directory from image..."
                      cp -r /opt/thunder/repository/database/* /data/
                      touch /data/.initialized
                      echo "Database initialization complete"
                    else
                      echo "Database already initialized"
                    fi
                  command:
                  - sh
                  - -c
                  image: ${parameters.image}
                  imagePullPolicy: ${parameters.runtime.imagePullPolicy}
                  name: init-database
                  volumeMounts:
                  - mountPath: /data
                    name: sqlite-data
                restartPolicy: OnFailure
                volumes:
                - configMap:
                    name: ${metadata.componentName}-config
                  name: thunder-config
                - name: sqlite-data
                  persistentVolumeClaim:
                    claimName: ${metadata.componentName}-sqlite
            ttlSecondsAfterFinished: 300
      - id: thunder-config
        includeWhen: ${parameters.runtime.dbType == 'sqlite'}
        template:
          apiVersion: v1
          data:
            deployment.yaml: |
              server:
                hostname: "0.0.0.0"
                public_url: "${environmentConfigs.serverPublicUrl}"
                port: ${workload.endpoints["api"].port}
                http_only: true

              gate_client:
                hostname: "${environmentConfigs.gateClientHostname}"
                port: {{.GATE_CLIENT_PORT}}
                scheme: "{{.GATE_CLIENT_SCHEME}}"

              crypto:
                encryption:
                  key: "{{.CRYPTO_ENCRYPTION_KEY}}"

              database:
                config:
                  type: "sqlite"
                  sqlite:
                    path: "{{.DB_CONFIG_PATH}}"
                runtime:
                  type: "sqlite"
                  sqlite:
                    path: "{{.DB_RUNTIME_PATH}}"
                user:
                  type: "sqlite"
                  sqlite:
                    path: "{{.DB_USER_PATH}}"

              cache:
                disabled: false
                type: "inmemory"
                size: {{.CACHE_SIZE}}
                ttl: {{.CACHE_TTL}}
                eviction_policy: "LRU"
                cleanup_interval: 600

              jwt:
                validity_period: {{.JWT_VALIDITY}}

              oauth:
                refresh_token:
                  renew_on_grant: true
                  validity_period: {{.OAUTH_REFRESH_TOKEN_VALIDITY}}

              flow:
                max_version_history: 3
                auto_infer_registration: true

              cors:
                allowed_origins: {{.CORS_ALLOWED_ORIGINS}}

              consent:
                enabled: {{.CONSENT_ENABLED}}
                base_url: "{{.CONSENT_BASE_URL}}"
          kind: ConfigMap
          metadata:
            name: ${metadata.componentName}-config
            namespace: ${metadata.namespace}
      - id: thunder-config-pg
        includeWhen: ${parameters.runtime.dbType == 'postgres'}
        template:
          apiVersion: v1
          data:
            deployment.yaml: |
              server:
                hostname: "0.0.0.0"
                public_url: "${environmentConfigs.serverPublicUrl}"
                port: ${workload.endpoints["api"].port}
                http_only: true

              gate_client:
                hostname: "${environmentConfigs.gateClientHostname}"
                port: {{.GATE_CLIENT_PORT}}
                scheme: "{{.GATE_CLIENT_SCHEME}}"

              crypto:
                encryption:
                  key: "{{.CRYPTO_ENCRYPTION_KEY}}"

              database:
                config:
                  type: "postgres"
                  postgres:
                    hostname: "{{.DB_CONFIG_HOSTNAME}}"
                    port: {{.DB_PORT}}
                    name: "{{.DB_CONFIG_NAME}}"
                    username: "{{.DB_CONFIG_USERNAME}}"
                    password: "{{.DB_CONFIG_PASSWORD}}"
                    sslmode: "{{.DB_CONFIG_SSLMODE}}"
                runtime:
                  type: "postgres"
                  postgres:
                    hostname: "{{.DB_RUNTIME_HOSTNAME}}"
                    port: {{.DB_PORT}}
                    name: "{{.DB_RUNTIME_NAME}}"
                    username: "{{.DB_RUNTIME_USERNAME}}"
                    password: "{{.DB_RUNTIME_PASSWORD}}"
                    sslmode: "{{.DB_RUNTIME_SSLMODE}}"
                user:
                  type: "postgres"
                  postgres:
                    hostname: "{{.DB_USER_HOSTNAME}}"
                    port: {{.DB_PORT}}
                    name: "{{.DB_USER_NAME}}"
                    username: "{{.DB_USER_USERNAME}}"
                    password: "{{.DB_USER_PASSWORD}}"
                    sslmode: "{{.DB_USER_SSLMODE}}"

              cache:
                disabled: false
                type: "inmemory"
                size: {{.CACHE_SIZE}}
                ttl: {{.CACHE_TTL}}
                eviction_policy: "LRU"
                cleanup_interval: 600

              jwt:
                validity_period: {{.JWT_VALIDITY}}

              oauth:
                refresh_token:
                  renew_on_grant: true
                  validity_period: {{.OAUTH_REFRESH_TOKEN_VALIDITY}}

              flow:
                max_version_history: 3
                auto_infer_registration: true

              cors:
                allowed_origins: {{.CORS_ALLOWED_ORIGINS}}

              consent:
                enabled: {{.CONSENT_ENABLED}}
                base_url: "{{.CONSENT_BASE_URL}}"
          kind: ConfigMap
          metadata:
            name: ${metadata.componentName}-config
            namespace: ${metadata.namespace}
      - id: gate-config
        template:
          apiVersion: v1
          data:
            config.js: |
              window.__THUNDER_RUNTIME_CONFIG__ = {
                client: {
                  base: "${parameters.runtime.gate.clientBase}",
                },
                server: {
                  public_url: "${environmentConfigs.serverPublicUrl}",
                },
              };
          kind: ConfigMap
          metadata:
            name: ${metadata.componentName}-gate-config
            namespace: ${metadata.namespace}
      - id: console-config
        template:
          apiVersion: v1
          data:
            config.js: |
              window.__THUNDER_RUNTIME_CONFIG__ = {
                client: {
                  base: "${parameters.runtime.console.clientBase}",
                  client_id: "${parameters.runtime.console.clientId}",
                  scopes: ${parameters.runtime.console.scopes},
                },
                server: {
                  public_url: "${environmentConfigs.serverPublicUrl}",
                },
              };
          kind: ConfigMap
          metadata:
            name: ${metadata.componentName}-console-config
            namespace: ${metadata.namespace}
      - forEach: ${configurations.toConfigFileList()}
        id: file-config
        template:
          apiVersion: v1
          data:
            ${config.name}: |
              ${config.value}
          kind: ConfigMap
          metadata:
            name: ${config.resourceName}
            namespace: ${metadata.namespace}
        var: config
      - id: deployment
        template:
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: ${metadata.componentName}
            namespace: ${metadata.namespace}
          spec:
            replicas: ${environmentConfigs.replicas}
            selector:
              matchLabels:
                app: ${metadata.componentName}
            template:
              metadata:
                labels:
                  app: ${metadata.componentName}
              spec:
                containers:
                - command:
                  - /opt/thunder/thunder
                  env: |
                    ${configurations.configs.envs.map(e, {"name": e.name, "value": e.value})}
                  image: ${parameters.image}
                  imagePullPolicy: ${parameters.runtime.imagePullPolicy}
                  name: thunder
                  ports:
                  - containerPort: ${workload.endpoints["api"].port}
                  resources:
                    limits:
                      cpu: ${environmentConfigs.resourceLimitsCpu}
                      memory: ${environmentConfigs.resourceLimitsMemory}
                    requests:
                      cpu: ${environmentConfigs.resourceRequestsCpu}
                      memory: ${environmentConfigs.resourceRequestsMemory}
                  volumeMounts: |
                    ${[
                      {"name": "thunder-config", "mountPath": "/opt/thunder/repository/conf/deployment.yaml", "subPath": "deployment.yaml"},
                      {"name": "gate-config", "mountPath": "/opt/thunder/apps/gate/config.js", "subPath": "config.js"},
                      {"name": "console-config", "mountPath": "/opt/thunder/apps/console/config.js", "subPath": "config.js"},
                      {"name": "sqlite-data", "mountPath": "/opt/thunder/repository/database"}
                    ] + configurations.toContainerVolumeMounts().map(m, {"name": m.name, "mountPath": m.mountPath, "subPath": m.subPath})}
                initContainers:
                - args:
                  - |
                    until [ -f /opt/thunder/repository/database/.setup-complete ]; do
                      echo "Waiting for setup job to complete..."
                      sleep 2
                    done
                    echo "Setup complete, starting Thunder..."
                  command:
                  - sh
                  - -c
                  image: ${parameters.image}
                  imagePullPolicy: ${parameters.runtime.imagePullPolicy}
                  name: wait-for-setup
                  volumeMounts:
                  - mountPath: /opt/thunder/repository/database
                    name: sqlite-data
                volumes: |
                  ${[
                    {"name": "thunder-config", "configMap": {"name": metadata.componentName + "-config"}},
                    {"name": "gate-config", "configMap": {"name": metadata.componentName + "-gate-config"}},
                    {"name": "console-config", "configMap": {"name": metadata.componentName + "-console-config"}},
                    {"name": "sqlite-data", "persistentVolumeClaim": {"claimName": metadata.componentName + "-sqlite"}}
                  ] + configurations.toVolumes().map(v, {"name": v.name, "configMap": {"name": v.configMap.name}})}
      - id: service
        template:
          apiVersion: v1
          kind: Service
          metadata:
            name: ${metadata.componentName}
            namespace: ${metadata.namespace}
          spec:
            ports:
            - name: http
              port: ${workload.endpoints["api"].port}
              protocol: TCP
              targetPort: ${workload.endpoints["api"].port}
            selector:
              app: ${metadata.componentName}
            type: ClusterIP
      - forEach: ${workload.endpoints.transformMap(name, ep, ep.type in ["HTTP", "GraphQL",
          "Websocket"], ep)}
        id: httproute-external
        includeWhen: ${environmentConfigs.endpointVisibility == 'external'}
        template:
          apiVersion: gateway.networking.k8s.io/v1
          kind: HTTPRoute
          metadata:
            labels: '${oc_merge(metadata.labels, {"openchoreo.dev/endpoint-name":
              endpoint.key, "openchoreo.dev/endpoint-visibility": "external"})}'
            name: ${oc_generate_name(metadata.componentName, endpoint.key)}
            namespace: ${metadata.namespace}
          spec:
            hostnames: |
              ${[gateway.ingress.external.?http, gateway.ingress.external.?https]
                .filter(g, g.hasValue()).map(g, g.value().host).distinct()
                .map(h, metadata.environmentName + "-" + metadata.componentName + "-" + metadata.componentNamespace + "." + h)}
            parentRefs:
            - name: ${gateway.ingress.external.name}
              namespace: ${gateway.ingress.external.namespace}
            rules:
            - backendRefs:
              - name: ${metadata.componentName}
                port: ${endpoint.value.port}
              filters:
              - type: URLRewrite
                urlRewrite:
                  path:
                    replacePrefixMatch: ${endpoint.value.?basePath.orValue("/")}
                    type: ReplacePrefixMatch
              matches:
              - path:
                  type: PathPrefix
                  value: /
        var: endpoint
      workloadType: deployment
  owner:
    componentName: thunder
    projectName: identity-platform
  workload:
    container:
      env:
      - key: SERVER_PORT
        value: "8090"
      - key: JWT_VALIDITY
        value: "3600"
      - key: OAUTH_REFRESH_TOKEN_VALIDITY
        value: "86400"
      - key: CACHE_SIZE
        value: "10000"
      - key: CACHE_TTL
        value: "3600"
      - key: CONSENT_ENABLED
        value: "false"
      - key: CONSENT_BASE_URL
        value: http://localhost:9090/api/v1
      - key: GATE_CLIENT_BASE
        value: /gate
      - key: CONSOLE_CLIENT_BASE
        value: /console
      - key: CONSOLE_CLIENT_ID
        value: CONSOLE
      - key: CONSOLE_SCOPES
        value: '["openid", "profile", "email", "system"]'
      - key: CORS_ALLOWED_ORIGINS
        value: '["http://development-thunder-thunder.openchoreoapis.localhost:19080",
          "https://localhost:3000"]'
      - key: GATE_CLIENT_PORT
        value: "19080"
      - key: GATE_CLIENT_SCHEME
        value: http
      - key: DB_CONFIG_PATH
        value: repository/database/configdb.db
      - key: DB_RUNTIME_PATH
        value: repository/database/runtimedb.db
      - key: DB_USER_PATH
        value: repository/database/userdb.db
      - key: CRYPTO_ENCRYPTION_KEY
        value: file://repository/resources/security/crypto.key
      files:
      - key: wso2_cloud_theme_v2.yaml
        mountPath: /opt/thunder/repository/resources/themes
        value: |
          id: "d1e2f3a4-b5c6-7890-abcd-theme0000002"
          displayName: "WSO2 Cloud Theme V11"
          description: "Default theme for WSO2 Cloud login pages"
          theme:
            direction: "ltr"
            defaultColorScheme: "light"
            colorSchemes:
              light:
                colors:
                  primary:
                    main: "#fa7b3f"
                    dark: "#e74420"
                    contrastText: "#ffffff"
                  secondary:
                    main: "#1a1a2e"
                    dark: "#0d0d1a"
                    contrastText: "#ffffff"
                  background:
                    default: "#f7f8fb"
                    paper: "#ffffff"
                  text:
                    primary: "#000000"
                    secondary: "#494848"
              dark:
                colors:
                  primary:
                    main: "#fa7b3f"
                    dark: "#e74420"
                    contrastText: "#ffffff"
                  secondary:
                    main: "#ff9966"
                    dark: "#fa7b3f"
                    contrastText: "#000000"
                  background:
                    default: "#121212"
                    paper: "#1e1e1e"
                  text:
                    primary: "#ffffff"
                    secondary: "#cccccc"
            shape:
              borderRadius: 8
            typography:
              fontFamily: "'Inter Variable', sans-serif"
              h1:
                fontSize: "1.75rem"
                fontWeight: 600
                lineHeight: 1.3
      - key: wso2_cloud_theme.yaml
        mountPath: /opt/thunder/repository/resources/themes
        value: |
          id: "d1e2f3a4-b5c6-7890-abcd-theme0000001"
          displayName: "WSO2 Cloud Theme"
          description: "Default theme for WSO2 Cloud login pages"
          theme:
            direction: "ltr"
            defaultColorScheme: "light"
            colorSchemes:
              light:
                colors:
                  primary:
                    main: "#fa7b3f"
                    dark: "#e74420"
                    contrastText: "#ffffff"
                  secondary:
                    main: "#1a1a2e"
                    dark: "#0d0d1a"
                    contrastText: "#ffffff"
                  background:
                    default: "#f7f8fb"
                    paper: "#ffffff"
                  text:
                    primary: "#000000"
                    secondary: "#494848"
              dark:
                colors:
                  primary:
                    main: "#fa7b3f"
                    dark: "#e74420"
                    contrastText: "#ffffff"
                  secondary:
                    main: "#ff9966"
                    dark: "#fa7b3f"
                    contrastText: "#000000"
                  background:
                    default: "#121212"
                    paper: "#1e1e1e"
                  text:
                    primary: "#ffffff"
                    secondary: "#cccccc"
            shape:
              borderRadius: 8
            typography:
              fontFamily: "'Inter Variable', sans-serif"
              h1:
                fontSize: "1.75rem"
                fontWeight: 600
                lineHeight: 1.3
      - key: sample-flow.yaml
        mountPath: /opt/thunder/repository/resources/flows
        value: |
          id: "f6a7b8c9-d0e1-2345-fabc-678901234567"
          handle: auth_flow_config_wso2_cloud_disambiguation
          name: WSO2 Cloud Authentication Flow with Disambiguation
          flowType: AUTHENTICATION
          nodes:
            - id: start
              type: START
              onSuccess: choose_auth

            # --- Choose social provider ---
            - id: choose_auth
              type: PROMPT
              meta:
                components:
                  - align: center
                    type: TEXT
                    id: text_001
                    label: "Sign in to WSO2 Cloud"
                    variant: HEADING_1
                  - type: BLOCK
                    id: block_001
                    components:
                      - eventType: TRIGGER
                        id: action_google
                        label: "Continue with Google"
                        type: ACTION
                        variant: SOCIAL
                      - eventType: TRIGGER
                        id: action_github
                        label: "Continue with GitHub"
                        type: ACTION
                        variant: SOCIAL
              prompts:
                - action:
                    ref: action_google
                    nextNode: google_auth
                - action:
                    ref: action_github
                    nextNode: github_auth

            # --- Google ---
            - id: google_auth
              type: TASK_EXECUTION
              properties:
                idpId: "456efc02-bad3-47bb-bd87-01cc94f8388c"
                allowAuthenticationWithoutLocalUser: true
                allowCrossOUProvisioning: true
              executor:
                name: GoogleOIDCAuthExecutor
              onSuccess: check_user_state

            # --- GitHub ---
            - id: github_auth
              type: TASK_EXECUTION
              properties:
                idpId: "372a20db-a946-4b40-add0-0049d15a5f9c"
                allowAuthenticationWithoutLocalUser: true
                allowCrossOUProvisioning: true
              executor:
                name: GithubOAuthExecutor
              onSuccess: check_user_state

            # --- Check if user is ambiguous (exists in multiple OUs) ---
            # Runs only when userAmbiguous=true (set by OAuthExecutor).
            # When not ambiguous, skips to org_registration_prompt.
            - id: check_user_state
              type: TASK_EXECUTION
              executor:
                name: IdentifyingExecutor
                mode: resolve
                inputs:
                  - identifier: sub
                    type: TEXT_INPUT
                    required: true
              onSuccess: org_registration_prompt
              onIncomplete: prompt_disambiguate
              condition:
                key: "{{ context.userAmbiguous }}"
                value: true
                onSkip: org_registration_prompt

            # --- Disambiguation: user exists in multiple OUs ---
            - id: prompt_disambiguate
              type: PROMPT
              meta:
                components:
                  - align: center
                    type: TEXT
                    id: text_disambig_title
                    label: "Select your organization"
                    variant: HEADING_1
                  - align: center
                    type: TEXT
                    id: text_disambig_subtitle
                    label: "Your account exists in multiple organizations. Please select one to continue."
                    variant: BODY_2
                  - type: BLOCK
                    id: block_disambig
                    components:
                      - id: select_ou
                        ref: ouHandle
                        type: SELECT
                        label: "Organization"
                        required: true
                        placeholder: "Select your organization"
                        options: []
                      - type: ACTION
                        id: action_select_ou
                        label: "Continue"
                        variant: PRIMARY
                        eventType: SUBMIT
              prompts:
                - inputs:
                    - ref: select_ou
                      identifier: ouHandle
                      type: SELECT
                      required: true
                  action:
                    ref: action_select_ou
                    nextNode: resolve_federated_user

            # --- Resolve disambiguated user (sets AuthenticatedUser) ---
            - id: resolve_federated_user
              type: TASK_EXECUTION
              executor:
                name: FederatedAuthResolverExecutor
                inputs:
                  - identifier: ouHandle
                    type: TEXT_INPUT
                    required: true
              onSuccess: auth_assert
              onIncomplete: prompt_disambiguate

            # --- OU provisioning (new social users) ---
            - id: org_registration_prompt
              type: PROMPT
              meta:
                components:
                  - align: center
                    type: TEXT
                    id: text_org_title
                    label: "Create Your Organization"
                    variant: HEADING_1
                  - align: center
                    type: TEXT
                    id: text_org_subtitle
                    label: "Set up your organization to get started"
                    variant: BODY
                  - type: BLOCK
                    id: block_org
                    components:
                      - id: input_ou_name
                        ref: ouName
                        type: TEXT_INPUT
                        label: "Organization Name"
                        required: true
                        placeholder: "Enter your organization name"
                      - id: input_ou_handle
                        ref: ouHandle
                        type: TEXT_INPUT
                        label: "Organization Handle"
                        required: true
                        placeholder: "Enter a unique handle (e.g., my-org)"
                      - eventType: SUBMIT
                        id: action_create_org
                        label: "Create Organization"
                        type: ACTION
                        variant: PRIMARY
              prompts:
                - inputs:
                    - ref: input_ou_name
                      type: TEXT_INPUT
                      identifier: ouName
                      required: true
                    - ref: input_ou_handle
                      type: TEXT_INPUT
                      identifier: ouHandle
                      required: true
                  action:
                    ref: action_create_org
                    nextNode: ou_creation
              condition:
                key: "{{ context.userEligibleForProvisioning }}"
                value: true
                onSkip: auth_assert

            - id: ou_creation
              type: TASK_EXECUTION
              executor:
                name: OUExecutor
              onSuccess: provisioning

            - id: provisioning
              type: TASK_EXECUTION
              executor:
                name: ProvisioningExecutor
              onSuccess: auth_assert

            # --- Final ---
            - id: auth_assert
              type: TASK_EXECUTION
              executor:
                name: AuthAssertExecutor
              onSuccess: end

            - id: end
              type: END
      - key: govid_theme.yaml
        mountPath: /opt/thunder/repository/resources/themes
        value: |
          id: "a1b2c3d4-e5f6-7890-abcd-govid0theme1"
          handle: "gov-id-theme"
          displayName: "Gov.ID"
          description: "Gov.ID theme with Sri Lankan flag-inspired colors."
          theme:
            defaultColorScheme: "light"
            direction: "ltr"
            shape:
              borderRadius: 12
            typography:
              fontFamily: "Sora, -apple-system, BlinkMacSystemFont, sans-serif"
              fontWeightRegular: 400
              fontSize: 14
              h1:
                fontSize: "1.85rem"
                fontWeight: 700
                fontFamily: "Space Grotesk, Sora, sans-serif"
                lineHeight: 1
                letterSpacing: "-0.03em"
              h2:
                fontSize: "1.5rem"
                fontWeight: 700
                fontFamily: "Space Grotesk, Sora, sans-serif"
                lineHeight: 1.2
                letterSpacing: "-0.02em"
              h3:
                fontSize: "1.05rem"
                fontWeight: 600
                fontFamily: "Sora, sans-serif"
                lineHeight: 1.167
              subtitle1:
                fontSize: "0.75rem"
                fontFamily: "Sora, sans-serif"
                fontWeight: 600
                lineHeight: 1.75
